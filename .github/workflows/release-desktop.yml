name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Publish as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  NODE_OPTIONS: --max-old-space-size=4096
  WAILS_VERSION: v2.12.0

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows EXE
            os: windows-latest
            platform: windows/amd64
            artifact_name: allapideck-windows-amd64
            release_file: allapideck-windows-amd64.exe
            wails_output: allapideck-windows-amd64.exe
            upload_path: desktop/release-assets/allapideck-windows-amd64.exe
          - label: macOS DMG
            os: macos-latest
            platform: darwin/universal
            artifact_name: allapideck-macos-universal
            release_file: allapideck-macos-universal.dmg
            wails_output: allapideck-macos-universal
            upload_path: desktop/release-assets/allapideck-macos-universal.dmg
          - label: Linux tar.gz
            os: ubuntu-24.04
            platform: linux/amd64
            artifact_name: allapideck-linux-amd64
            wails_output: allapideck-linux-amd64
            upload_path: |
              desktop/release-assets/allapideck-linux-amd64.tar.gz
              desktop/release-assets/allapideck-linux-amd64.deb
              desktop/release-assets/allapideck-linux-amd64.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod
          cache-dependency-path: desktop/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Prepare Go caches
        run: |
          $gopath = Join-Path $env:RUNNER_TEMP "go"
          $gomodcache = Join-Path $gopath "pkg/mod"
          $gocache = Join-Path $env:RUNNER_TEMP "go-build"
          New-Item -ItemType Directory -Path $gomodcache -Force | Out-Null
          New-Item -ItemType Directory -Path $gocache -Force | Out-Null
          "GOPATH=$gopath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GOMODCACHE=$gomodcache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GOCACHE=$gocache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Install frontend dependencies
        run: |
          bun install
        shell: pwsh

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${env:WAILS_VERSION}
          $gopath = go env GOPATH
          "$gopath/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          export NEEDRESTART_MODE=a
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends -o Acquire::Retries=3 -o Dpkg::Use-Pty=0 \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            desktop-file-utils \
            patchelf \
            squashfs-tools \
            zsync \
            fakeroot \
            imagemagick
        shell: bash

      - name: Build Windows desktop binary
        if: runner.os == 'Windows'
        run: |
          bun run build:desktop -- --platform ${{ matrix.platform }} -o ${{ matrix.wails_output }}
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Copy-Item "build/bin/${{ matrix.release_file }}" "release-assets/${{ matrix.release_file }}"
        shell: pwsh

      - name: Build macOS app bundle and package DMG
        if: runner.os == 'macOS'
        run: |
          bun run build:desktop -- --platform ${{ matrix.platform }} -o ${{ matrix.wails_output }}
          app="build/bin/${{ matrix.wails_output }}.app"
          if [ ! -d "$app" ]; then
            app="$(find build/bin -maxdepth 1 -name '*.app' | head -n 1)"
          fi
          if [ -z "$app" ] || [ ! -d "$app" ]; then
            echo "No macOS .app bundle found in build/bin" >&2
            exit 1
          fi
          stage="$(mktemp -d)"
          ditto "$app" "$stage/$(basename "$app")"
          ln -s /Applications "$stage/Applications"
          mkdir -p release-assets
          hdiutil create -volname "$(basename "$app" .app)" -srcfolder "$stage" -ov -format UDZO "release-assets/${{ matrix.release_file }}"
          rm -rf "$stage"
        shell: bash

      - name: Build Linux binary and package release assets
        if: runner.os == 'Linux'
        run: |
          bun run build:desktop -- --platform ${{ matrix.platform }} -tags webkit2_41 -o ${{ matrix.wails_output }}
          bash scripts/package-linux.sh "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" "build/bin/${{ matrix.wails_output }}" "release-assets"
        shell: bash

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.upload_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        run: |
          shopt -s nullglob
          files=(release-assets/*)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
            exit 0
          fi

          args=(gh release create "$RELEASE_TAG" "${files[@]}" --title "$RELEASE_TAG" --generate-notes --target "$GITHUB_SHA")
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          "${args[@]}"
        shell: bash
